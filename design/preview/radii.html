<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
.grid { display:flex; gap:16px; align-items:flex-end; }
.r { text-align:center; }
.r .box { background: var(--tx-accent-subtle); border: 2px solid var(--tx-accent); }
.r .k { font-size:11px; font-weight:600; color:var(--tx-text-secondary); margin-top:8px; }
.r .v { font-size:10px; color:var(--tx-text-muted); font-family:ui-monospace,Menlo,monospace; }
</style></head>
<body>
<div class="grid">
  <div class="r"><div class="box" style="width:60px;height:60px;border-radius:6px"></div><div class="k">xs</div><div class="v">6</div></div>
  <div class="r"><div class="box" style="width:60px;height:60px;border-radius:10px"></div><div class="k">sm</div><div class="v">10</div></div>
  <div class="r"><div class="box" style="width:60px;height:60px;border-radius:14px"></div><div class="k">md</div><div class="v">14</div></div>
  <div class="r"><div class="box" style="width:60px;height:60px;border-radius:20px"></div><div class="k">lg</div><div class="v">20</div></div>
  <div class="r"><div class="box" style="width:60px;height:60px;border-radius:28px"></div><div class="k">xl</div><div class="v">28</div></div>
  <div class="r"><div class="box" style="width:60px;height:60px;border-radius:22.5%"></div><div class="k">tile</div><div class="v">22.5%</div></div>
  <div class="r"><div class="box" style="width:60px;height:60px;border-radius:999px"></div><div class="k">pill</div><div class="v">full</div></div>
</div>
</body></html>
