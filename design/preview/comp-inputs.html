<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_components.css">
<style>
body { margin:0; font-family:var(--tx-font-primary); }
.split { display:grid; grid-template-columns:1fr 1fr; }
.pane { padding:20px; display:flex; flex-direction:column; gap:14px; }
.pane.l { background:#F4F6FA; }
.pane.d { background:#0B0F17; }
</style></head>
<body>
<div class="split">
  <div class="pane l demo">
    <div class="field"><label>E-mail</label><input class="input" value="coach@talent-x.app"></div>
    <div class="field is-disabled"><label>Club</label><input class="input" value="Indisponible" disabled></div>
  </div>
  <div class="pane d demo" data-theme="dark">
    <div class="field"><label>E-mail</label><input class="input" placeholder="vous@exemple.com" style="border-color:var(--tx-accent);box-shadow:0 0 0 3px var(--tx-accent-subtle)"></div>
    <div class="field"><label>Mot de passe</label><input class="input is-error" type="password" value="123"><span class="err">Au moins 8 caractères.</span></div>
  </div>
</div>
</body></html>
