<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
.ramp { display: grid; grid-template-columns: repeat(13, 1fr); gap: 5px; }
.sw .chip { height: 52px; border: 1px solid rgba(11,15,23,.08); border-radius: 8px; }
.sw .k { font-size: 10px; font-weight: 600; margin-top: 5px; color: var(--tx-text-secondary); }
.sw .h { font-size: 8px; color: var(--tx-text-muted); font-family: ui-monospace, Menlo, monospace; }
</style></head>
<body>
<div class="ramp">
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="k">0</div><div class="h">FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:#F4F6FA"></div><div class="k">50</div><div class="h">F4F6FA</div></div>
  <div class="sw"><div class="chip" style="background:#E7ECF3"></div><div class="k">100</div><div class="h">E7ECF3</div></div>
  <div class="sw"><div class="chip" style="background:#D3DAE6"></div><div class="k">200</div><div class="h">D3DAE6</div></div>
  <div class="sw"><div class="chip" style="background:#B6C0D0"></div><div class="k">300</div><div class="h">B6C0D0</div></div>
  <div class="sw"><div class="chip" style="background:#8A94A6"></div><div class="k">400</div><div class="h">8A94A6</div></div>
  <div class="sw"><div class="chip" style="background:#5C6678"></div><div class="k">500</div><div class="h">5C6678</div></div>
  <div class="sw"><div class="chip" style="background:#434B5C"></div><div class="k">600</div><div class="h">434B5C</div></div>
  <div class="sw"><div class="chip" style="background:#2A3140"></div><div class="k">700</div><div class="h">2A3140</div></div>
  <div class="sw"><div class="chip" style="background:#161B27"></div><div class="k">800</div><div class="h">161B27</div></div>
  <div class="sw"><div class="chip" style="background:#11151F"></div><div class="k">850</div><div class="h">11151F</div></div>
  <div class="sw"><div class="chip" style="background:#0E121B"></div><div class="k">900</div><div class="h">0E121B</div></div>
  <div class="sw"><div class="chip" style="background:#0B0F17"></div><div class="k">ink</div><div class="h">0B0F17</div></div>
</div>
</body></html>
