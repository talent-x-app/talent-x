<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_components.css">
<style>
body { margin:0; font-family:var(--tx-font-primary); }
.split { display:grid; grid-template-columns:1fr 1fr; }
.pane { padding:22px; display:flex; flex-direction:column; gap:20px; justify-content:center; }
.pane.l { background:#F4F6FA; }
.pane.d { background:#0B0F17; }
.cap { font-size:10px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--tx-text-muted); margin-bottom:-8px; }
.rpe { display:flex; gap:5px; }
.rpe .p { flex:1; height:34px; border-radius:8px; background:var(--tx-surface-sunken); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:var(--tx-text-muted); }
.rpe .p.on { background:var(--tx-accent); color:#fff; }
.rpe .p.hi { background:var(--tx-warning); color:#3a2a05; }
</style></head>
<body>
<div class="split">
  <div class="pane l demo">
    <span class="cap">Slider · charge</span>
    <div class="slider"><div class="fill" style="width:45%"></div><div class="knob" style="left:45%"></div></div>
    <span class="cap">RPE 1–10</span>
    <div class="rpe"><span class="p">1</span><span class="p">2</span><span class="p">3</span><span class="p">4</span><span class="p">5</span><span class="p">6</span><span class="p on">7</span><span class="p">8</span><span class="p">9</span><span class="p">10</span></div>
  </div>
  <div class="pane d demo" data-theme="dark">
    <span class="cap">Slider · charge</span>
    <div class="slider"><div class="fill" style="width:70%"></div><div class="knob" style="left:70%"></div></div>
    <span class="cap">RPE 1–10</span>
    <div class="rpe"><span class="p">1</span><span class="p">2</span><span class="p">3</span><span class="p">4</span><span class="p">5</span><span class="p">6</span><span class="p">7</span><span class="p">8</span><span class="p hi">9</span><span class="p">10</span></div>
  </div>
</div>
</body></html>
