<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_components.css">
<style>
body { margin:0; font-family:var(--tx-font-primary); }
.split { display:grid; grid-template-columns:1fr 1fr; }
.pane { padding:20px; display:flex; flex-direction:column; gap:16px; }
.pane.l { background:#F4F6FA; }
.pane.d { background:#0B0F17; }
</style></head>
<body>
<div class="split">
  <div class="pane l demo">
    <div class="segmented"><button class="on">Semaine</button><button>Mois</button><button>Année</button></div>
    <div class="row" style="display:flex;gap:8px;flex-wrap:wrap">
      <span class="chip-tag on">Force</span><span class="chip-tag">Cardio</span><span class="chip-tag">Mobilité</span><span class="chip-tag">Récup</span>
    </div>
  </div>
  <div class="pane d demo" data-theme="dark">
    <div class="segmented"><button>Semaine</button><button class="on">Mois</button><button>Année</button></div>
    <div class="row" style="display:flex;gap:8px;flex-wrap:wrap">
      <span class="chip-tag on">Force</span><span class="chip-tag">Cardio</span><span class="chip-tag">Mobilité</span><span class="chip-tag">Récup</span>
    </div>
  </div>
</div>
</body></html>
