<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
.spec { display:flex; align-items:baseline; gap:14px; padding: 6px 0; border-bottom: 1px solid var(--tx-border); }
.spec:last-child { border-bottom: 0; }
.spec .t { flex: 1; color: var(--tx-text-primary); letter-spacing: -0.02em; line-height: 1.05; }
.spec .m { font-size: 10px; color: var(--tx-text-muted); font-family: ui-monospace, Menlo, monospace; white-space: nowrap; }
</style></head>
<body>
<div class="spec"><span class="t" style="font-size:44px;font-weight:700">Display</span><span class="m">44 / 1.08 / 700</span></div>
<div class="spec"><span class="t" style="font-size:34px;font-weight:700">Heading 1</span><span class="m">34 / 1.14 / 700</span></div>
<div class="spec"><span class="t" style="font-size:28px;font-weight:600">Heading 2</span><span class="m">28 / 1.2 / 600</span></div>
<div class="spec"><span class="t" style="font-size:22px;font-weight:600">Heading 3</span><span class="m">22 / 1.27 / 600</span></div>
</body></html>
