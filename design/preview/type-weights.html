<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
.grid { display:grid; grid-template-columns: repeat(4,1fr); gap:16px; }
.w .big { font-size: 40px; line-height:1; color: var(--tx-text-primary); }
.w .n { font-size: 11px; color: var(--tx-text-secondary); margin-top: 8px; font-weight:600; }
.w .v { font-size: 10px; color: var(--tx-text-muted); font-family: ui-monospace, Menlo, monospace; }
.foot { margin-top:16px; font-size:12px; color:var(--tx-text-muted); }
.foot b { color: var(--tx-text-secondary); font-weight:600; }
</style></head>
<body>
<div class="grid">
  <div class="w"><div class="big" style="font-weight:400">Aa</div><div class="n">Regular</div><div class="v">400</div></div>
  <div class="w"><div class="big" style="font-weight:500">Aa</div><div class="n">Medium</div><div class="v">500</div></div>
  <div class="w"><div class="big" style="font-weight:600">Aa</div><div class="n">SemiBold</div><div class="v">600</div></div>
  <div class="w"><div class="big" style="font-weight:700">Aa</div><div class="n">Bold</div><div class="v">700</div></div>
</div>
<div class="foot"><b>Poppins</b> · SIL Open Font License — titres &amp; UI. Le wordmark est construit sur Poppins&nbsp;Bold.</div>
</body></html>
