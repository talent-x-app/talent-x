<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
.ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
.sw { border-radius: 8px; overflow: hidden; }
.chip { height: 52px; border: 1px solid rgba(11,15,23,.08); border-radius: 8px; }
.sw .k { font-size: 10px; font-weight: 600; margin-top: 5px; color: var(--tx-text-secondary); }
.sw .h { font-size: 9px; color: var(--tx-text-muted); font-family: ui-monospace, Menlo, monospace; }
.tag { display:inline-block; font-size:9px; font-weight:600; color:#fff; background:#2E7CF6; border-radius:4px; padding:1px 5px; margin-left:5px; vertical-align:middle; }
</style></head>
<body>
<div class="ramp">
  <div class="sw"><div class="chip" style="background:#EBF3FF"></div><div class="k">50</div><div class="h">EBF3FF</div></div>
  <div class="sw"><div class="chip" style="background:#D6E7FF"></div><div class="k">100</div><div class="h">D6E7FF</div></div>
  <div class="sw"><div class="chip" style="background:#ADCFFF"></div><div class="k">200</div><div class="h">ADCFFF</div></div>
  <div class="sw"><div class="chip" style="background:#85B8FF"></div><div class="k">300</div><div class="h">85B8FF</div></div>
  <div class="sw"><div class="chip" style="background:#5BAEFF"></div><div class="k">400</div><div class="h">5BAEFF</div></div>
  <div class="sw"><div class="chip" style="background:#2E7CF6; box-shadow:0 0 0 2px #2E7CF6, 0 0 0 4px rgba(46,124,246,.25)"></div><div class="k">500<span class="tag">X</span></div><div class="h">2E7CF6</div></div>
  <div class="sw"><div class="chip" style="background:#1B5BE0"></div><div class="k">600</div><div class="h">1B5BE0</div></div>
  <div class="sw"><div class="chip" style="background:#1747B0"></div><div class="k">700</div><div class="h">1747B0</div></div>
  <div class="sw"><div class="chip" style="background:#143A8C"></div><div class="k">800</div><div class="h">143A8C</div></div>
  <div class="sw"><div class="chip" style="background:#102C66"></div><div class="k">900</div><div class="h">102C66</div></div>
  <div class="sw"><div class="chip" style="background:#1F4E79"></div><div class="k">navy</div><div class="h">1F4E79</div></div>
</div>
</body></html>
