<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
.tracks { display:flex; flex-direction:column; gap:14px; }
.t { display:flex; align-items:center; gap:12px; }
.t .k { width:96px; font-size:11px; font-weight:600; color:var(--tx-text-secondary); }
.t .k span { display:block; font-size:9px; color:var(--tx-text-muted); font-family:ui-monospace,Menlo,monospace; font-weight:400; }
.rail { flex:1; height:8px; background:var(--tx-surface-sunken); border-radius:999px; position:relative; overflow:hidden; }
.dot { position:absolute; top:-4px; width:16px; height:16px; border-radius:50%; background:var(--tx-accent); left:0; }
.d-fast .dot { animation: run 1.2s infinite cubic-bezier(0.2,0,0,1); }
.d-base .dot { animation: run 1.8s infinite cubic-bezier(0,0,0.2,1); }
.d-spring .dot { animation: run 2.2s infinite cubic-bezier(0.34,1.56,0.64,1); }
@keyframes run { 0%,12% { left:0 } 50%,62% { left:calc(100% - 16px) } 100% { left:0 } }
</style></head>
<body>
<div class="tracks">
  <div class="t"><div class="k">fast<span>120ms · standard</span></div><div class="rail d-fast"><div class="dot"></div></div></div>
  <div class="t"><div class="k">base<span>220ms · decelerate</span></div><div class="rail d-base"><div class="dot"></div></div></div>
  <div class="t"><div class="k">spring<span>360ms · overshoot</span></div><div class="rail d-spring"><div class="dot"></div></div></div>
</div>
</body></html>
