<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
.scale { display:flex; flex-direction:column; gap:7px; }
.s { display:flex; align-items:center; gap:12px; }
.s .bar { height: 14px; background: var(--tx-accent); border-radius: 3px; }
.s .k { width: 26px; font-size: 11px; font-weight:600; color: var(--tx-text-secondary); }
.s .v { font-size: 10px; color: var(--tx-text-muted); font-family: ui-monospace, Menlo, monospace; }
</style></head>
<body>
<div class="scale">
  <div class="s"><span class="k">1</span><span class="bar" style="width:4px"></span><span class="v">4px</span></div>
  <div class="s"><span class="k">2</span><span class="bar" style="width:8px"></span><span class="v">8px</span></div>
  <div class="s"><span class="k">3</span><span class="bar" style="width:12px"></span><span class="v">12px</span></div>
  <div class="s"><span class="k">4</span><span class="bar" style="width:16px"></span><span class="v">16px</span></div>
  <div class="s"><span class="k">5</span><span class="bar" style="width:20px"></span><span class="v">20px</span></div>
  <div class="s"><span class="k">6</span><span class="bar" style="width:24px"></span><span class="v">24px</span></div>
  <div class="s"><span class="k">8</span><span class="bar" style="width:32px"></span><span class="v">32px</span></div>
  <div class="s"><span class="k">10</span><span class="bar" style="width:40px"></span><span class="v">40px</span></div>
  <div class="s"><span class="k">12</span><span class="bar" style="width:48px"></span><span class="v">48px</span></div>
  <div class="s"><span class="k">16</span><span class="bar" style="width:64px"></span><span class="v">64px</span></div>
</div>
</body></html>
