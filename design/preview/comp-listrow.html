<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_components.css">
<style>
body { margin:0; font-family:var(--tx-font-primary); }
.split { display:grid; grid-template-columns:1fr 1fr; }
.pane { padding:16px; }
.pane.l { background:#F4F6FA; }
.pane.d { background:#0B0F17; }
.av { width:40px; height:40px; border-radius:50%; background:#2A3140; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:14px; flex:none; }
.chev { color:var(--tx-text-muted); }
</style></head>
<body>
<div class="split">
  <div class="pane l demo">
    <div class="lrow"><span class="av" style="background:var(--tx-gradient-x)">JL</span><div class="meta"><div class="t1">Julie Lambert</div><div class="t2">Athlète · 4 séances/sem.</div></div><span class="badge badge-success">+12%</span></div>
    <div class="lrow"><span class="av">MR</span><div class="meta"><div class="t1">Marc Renaud</div><div class="t2">Athlète · charge stable</div></div><svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div>
  </div>
  <div class="pane d demo" data-theme="dark">
    <div class="lrow" style="background:var(--tx-surface-sunken)"><span class="av" style="background:var(--tx-gradient-x)">JL</span><div class="meta"><div class="t1">Julie Lambert</div><div class="t2">Athlète · 4 séances/sem.</div></div><span class="badge badge-success">+12%</span></div>
    <div class="lrow"><span class="av">MR</span><div class="meta"><div class="t1">Marc Renaud</div><div class="t2">Athlète · charge stable</div></div><svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></div>
  </div>
</div>
</body></html>
