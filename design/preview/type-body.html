<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_card.css">
<style>
.spec { display:flex; align-items:baseline; gap:14px; padding: 5px 0; border-bottom: 1px solid var(--tx-border); }
.spec:last-child { border-bottom: 0; }
.spec .t { flex: 1; color: var(--tx-text-primary); }
.spec .m { font-size: 10px; color: var(--tx-text-muted); font-family: ui-monospace, Menlo, monospace; white-space: nowrap; }
</style></head>
<body>
<div class="spec"><span class="t" style="font-size:18px;font-weight:600">Title — séance du jour</span><span class="m">18 / 1.33 / 600</span></div>
<div class="spec"><span class="t" style="font-size:17px;font-weight:400">Body large — texte de lecture confortable</span><span class="m">17 / 1.5 / 400</span></div>
<div class="spec"><span class="t" style="font-size:15px;font-weight:400">Body — taille de texte par défaut de l'interface</span><span class="m">15 / 1.55 / 400</span></div>
<div class="spec"><span class="t" style="font-size:13px;font-weight:400">Body small — métadonnées et libellés secondaires</span><span class="m">13 / 1.5 / 400</span></div>
<div class="spec"><span class="t" style="font-size:12px;font-weight:500">Caption — annotations</span><span class="m">12 / 1.4 / 500</span></div>
<div class="spec"><span class="t" style="font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase">Overline</span><span class="m">11 / .22em / 600</span></div>
</body></html>
