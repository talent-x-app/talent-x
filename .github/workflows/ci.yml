name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les exécutions obsolètes sur une même réf (push successifs).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Typecheck · Tests · Build
    runs-on: ubuntu-latest
    env:
      # Aucune base réelle en CI : Prisma se construit avec cette URL factice et
      # les tests qui touchent la base la voient indisponible (readiness → 503).
      # Pas un secret : pointe une base inexistante. La vraie config vit dans
      # les secrets d'environnement (cf. TLX-004). Les tests d'INTÉGRATION
      # (test:int) surchargent DATABASE_URL vers le service `postgres` ci-dessous.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
    # Base réelle dédiée aux tests d'intégration DB-backed (TLX-79).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: talentx
          POSTGRES_PASSWORD: talentx
          POSTGRES_DB: talentx
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U talentx -d talentx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Generate Prisma client
        run: pnpm --filter @talent-x/api exec prisma generate

      # Build en premier : les packages partagés (design-tokens, api-client)
      # exposent leurs types via dist/, que leurs consommateurs (mobile) doivent
      # pouvoir résoudre au typecheck. pnpm -r build respecte l'ordre topologique.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      # Tests unitaires de tous les paquets (api, mobile, design-tokens).
      # api & mobile passent par test:cov : les seuils de couverture « ratchet »
      # (coverageThreshold, TLX-120) ne s'appliquent qu'avec --coverage.
      - name: Tests unitaires + couverture (api)
        run: pnpm --filter @talent-x/api test:cov

      - name: Tests unitaires + couverture (mobile)
        run: pnpm --filter @talent-x/mobile test:cov

      - name: Tests unitaires (autres paquets)
        run: pnpm --filter '!@talent-x/api' --filter '!@talent-x/mobile' -r --if-present test

      # Tests e2e API « sans base » (Jest + Supertest). Config dédiée, base factice
      # (cf. DATABASE_URL ci-dessus) : valide les comportements transverses sans
      # base réelle. Les e2e mobile (Maestro) nécessitent un émulateur et sont
      # joués en staging/manuellement (cf. README §Tests, TX-OPS-004 §6).
      - name: Tests e2e API
        run: pnpm --filter @talent-x/api test:e2e

      # Tests d'INTÉGRATION DB-backed (TLX-79) : chemins nominaux contre une vraie
      # base Postgres (service ci-dessus). On applique les migrations puis on joue
      # la suite *.int-spec. DATABASE_URL surchargé vers le service `postgres`.
      - name: Migrations (base d'intégration)
        run: pnpm --filter @talent-x/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://talentx:talentx@localhost:5432/talentx?schema=public

      # Inclut la suite E2E des parcours critiques (critical-paths.int-spec, TLX-120) :
      # cycle complet coach↔athlète via HTTP contre la base du service `postgres`.
      - name: Tests d'intégration & parcours critiques (DB)
        run: pnpm --filter @talent-x/api test:int
        env:
          DATABASE_URL: postgresql://talentx:talentx@localhost:5432/talentx?schema=public
