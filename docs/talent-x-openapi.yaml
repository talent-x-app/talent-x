components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT signé RS256.
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AthleteIdPath:
      name: athleteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobIdPath:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortParam:
      name: sort
      in: query
      required: false
      description: Champ de tri, préfixé de '-' pour l'ordre décroissant (ex. -createdAt).
      schema:
        type: string
    SessionStatusFilter:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/SessionStatus'
    AssignmentStatusFilter:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AssignmentStatus'
    SessionIdQuery:
      name: sessionId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    PerformanceIdQuery:
      name: performanceId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Clé d'idempotence générée par le client pour absorber les reprises réseau.
      schema:
        type: string
  headers:
    RateLimit-Limit:
      description: Quota sur la fenêtre courante.
      schema:
        type: integer
    RateLimit-Remaining:
      description: Requêtes restantes sur la fenêtre.
      schema:
        type: integer
    RateLimit-Reset:
      description: Secondes avant réinitialisation du quota.
      schema:
        type: integer
    Retry-After:
      description: Secondes à attendre avant un nouvel essai.
      schema:
        type: integer
  responses:
    BadRequest:
      description: Requête invalide.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 400
            error: BAD_REQUEST
            message: Invalid request
    Unauthorized:
      description: Authentification requise ou invalide.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 401
            error: UNAUTHORIZED
            message: Authentication required
    Forbidden:
      description: Accès refusé (rôle, appartenance ou propriété).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 403
            error: FORBIDDEN
            message: Access denied
    NotFound:
      description: Ressource introuvable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 404
            error: NOT_FOUND
            message: Resource not found
    Conflict:
      description: Conflit (ressource déjà existante).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 409
            error: CONFLICT
            message: Resource already exists
    ValidationFailed:
      description: Échec de validation des données.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 422
            error: VALIDATION_ERROR
            message: Validation failed
            details:
            - field: email
              constraint: isEmail
              message: email must be a valid email address
    TooManyRequests:
      description: Trop de requêtes (rate limiting).
      headers:
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 429
            error: RATE_LIMITED
            message: Too many requests
    ServerError:
      description: Erreur interne.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 500
            error: INTERNAL_ERROR
            message: Internal server error
    ConsentRequired:
      description: Action bloquée faute de consentement actif.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 403
            error: CONSENT_REQUIRED
            message: Consent required
    IdempotencyConflict:
      description: 'Conflit d''idempotence : la clé a déjà été utilisée avec une charge différente.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 409
            error: IDEMPOTENCY_CONFLICT
            message: Idempotency key reused with a different payload
    TokenReuse:
      description: 'Réutilisation de refresh token détectée : la famille de jetons est révoquée.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 409
            error: TOKEN_REUSE_DETECTED
            message: Session invalidated
  schemas:
    Error:
      type: object
      properties:
        statusCode:
          type: integer
        error:
          type: string
          description: Code d'erreur stable et exploitable côté client.
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationDetail'
        timestamp:
          type: string
          format: date-time
        path:
          type: string
      required:
      - statusCode
      - error
      - message
    ValidationDetail:
      type: object
      properties:
        field:
          type: string
        constraint:
          type: string
        message:
          type: string
