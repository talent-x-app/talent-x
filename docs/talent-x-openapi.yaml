      - label
      - value
      - unit
    PersonalRecord:
      type: object
      description: Record personnel matérialisé d'un athlète sur une épreuve (ADR-20).
      properties:
        id:
          type: string
          format: uuid
        athleteId:
          type: string
          format: uuid
        eventKey:
          type: string
        label:
          type: string
        value:
          type: number
        unit:
          type: string
          enum: [s, m]
        direction:
          type: string
          enum: [min, max]
        achievedAt:
          type: string
          format: date
        performanceId:
          type: string
          format: uuid
          description: Performance source (absent si record déclaré manuellement).
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - athleteId
      - eventKey
      - label
      - value
      - unit
      - direction
      - achievedAt
    PersonalRecordList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PersonalRecord'
      required:
      - items
    RecordConfirm:
      type: object
      description: >-
        Confirmation d'un candidat record (ADR-20) : la valeur est revalidée côté serveur
        depuis la performance source — pas de valeur libre sur ce chemin.
      properties:
        performanceId:
          type: string
          format: uuid
      required:
