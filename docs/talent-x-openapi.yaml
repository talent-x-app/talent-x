      - status
      - overdueCount
      - toReviewCount
    LoadZone:
      type: string
      description: Interprétation de l'ACWR — zone sûre 0.8–1.3 (TLX-113).
      enum:
      - insufficient
      - underload
      - optimal
      - overload
    TrainingLoad:
      type: object
      description: >-
        Charge d'entraînement d'un athlète (méthode sRPE/ACWR de Foster, TLX-113).
        Présent sur DashboardAthlete seulement si coach_access est accordé.
      properties:
        acute:
          type: integer
          description: Charge aiguë (somme sRPE 7 j).
        chronic:
          type: integer
          description: Charge chronique (moyenne hebdomadaire sur 28 j).
        acwr:
          type: number
          description: Ratio aigu:chronique ; absent si chronique nulle.
        zone:
          $ref: '#/components/schemas/LoadZone'
        weeklyLoad:
          type: integer
          description: Charge de la semaine en cours.
        monotony:
          type: number
          description: Monotonie (moyenne/écart-type des charges quotidiennes).
        strain:
          type: number
          description: Contrainte = charge hebdo × monotonie.
        sessions:
          type: integer
          description: Nombre de séances chargées prises en compte (28 j).
      required:
      - acute
      - chronic
      - zone
      - weeklyLoad
      - sessions
    DashboardAlerts:
      type: object
      description: Alertes & signaux agrégés (Carte C-01 §5).
      properties:
        missedSessions:
          type: integer
          description: Affectations échues non réalisées, tous athlètes confondus.
        consentMissing:
          type: integer
          description: Athlètes liés sans consentement coach_access actif.
      required:
      - missedSessions
      - consentMissing
    DashboardSummary:
      type: object
      description: KPIs et compteurs du tableau de bord coach (ADR-17).
      properties:
        athleteCount:
          type: integer
        toReview:
          type: integer
          description: Performances en attente de revue (toutes confondues).
        today:
          type: integer
          description: Affectations à échéance aujourd'hui, non réalisées.
        alerts:
          $ref: '#/components/schemas/DashboardAlerts'
      required:
      - athleteCount
      - toReview
      - today
      - alerts
    Dashboard:
      type: object
      properties:
        athletes:
          type: array
          items:
            $ref: '#/components/schemas/DashboardAthlete'
        summary:
          $ref: '#/components/schemas/DashboardSummary'
      required:
      - athletes
      - summary
    DevicePlatform:
      type: string
      enum:
      - apns
      - fcm
    NotificationType:
      type: string
      description: Taxonomie des événements notifiables (ADR-22).
      enum:
      - session_assigned
      - performance_feedback
      - group_update
    Notification:
      type: object
      description: Notification in-app (ADR-23) — signal minimal, libellé côté client.
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/NotificationType'
        resourceId:
          type: string
          format: uuid
          description: Ressource à ouvrir — affectation pour session_assigned et
            performance_feedback (le fil de feedback vit sur le détail de séance),
            groupe pour group_update.
        readAt:
          type: string
          format: date-time
          description: Absent tant que non lue.
        createdAt:
          type: string
          format: date-time
      required:
      - id
      - type
      - resourceId
      - createdAt
    NotificationPage:
      type: object
      required:
      - data
      - meta
      - unreadCount
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        meta:
          $ref: '#/components/schemas/PageMeta'
        unreadCount:
          type: integer
          description: Nombre total de notifications non lues (badge).
    ReadAllResult:
      type: object
      required:
      - updated
      properties:
        updated:
          type: integer
          description: Nombre de notifications passées à lues.
    DeviceToken:
      type: object
      properties:
