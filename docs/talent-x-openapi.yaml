# Talent-X — Contrat OpenAPI 3.1
# Source de vérité de l'API. Dérivé de TX-SPEC-002 v2.0 et TX-DATA-006.
# Généré le 2026-06-04. À versionner dans le dépôt (ex. /openapi/talent-x.yaml).

openapi: 3.1.0
info:
  title: Talent-X API
  version: 1.0.0
  description: 'Contrat d''API REST de Talent-X — source de vérité dérivée de TX-SPEC-002 v2.0 (catalogue
    d''endpoints, matrice d''autorisation, conventions et format d''erreur) et alignée sur le modèle de
    données TX-DATA-006.


    Conventions transverses : préfixe /api/v1 ; jeton d''accès JWT (RS256) via en-tête Authorization ;
    pagination par enveloppe { data, meta } ; idempotence des écritures sensibles via Idempotency-Key
    ; opérations longues asynchrones (202 + ressource de statut) ; rate limiting signalé par les en-têtes
    RateLimit-*. L''autorisation combine rôle, appartenance (lien coach↔athlète), propriété et consentement
    ; voir TX-SPEC-002 §6.'
  contact:
    name: Talent-X
  license:
    name: Propriétaire
servers:
- url: https://api.talent-x.example/api/v1
  description: Production (URL à confirmer)
- url: http://localhost:3000/api/v1
  description: Développement local
tags:
- name: Authentification
  description: Inscription, connexion, rotation des jetons, 2FA.
- name: Profil & RGPD
  description: Profil, consentements, export et suppression.
- name: Groupes
  description: Création et administration des groupes et des effectifs.
- name: Séances
  description: Cycle de vie et affectation des séances.
- name: Affectations & performances
  description: Affectations et saisie des performances.
- name: Compétitions
  description: Compétitions et engagements d'athlètes (ADR-24).
- name: Collaboration
  description: Commentaires sur séances et performances.
- name: Progression
  description: Progression athlète et tableau de bord coach.
- name: Notifications
  description: Device tokens et préférences.
- name: Système
  description: Health et readiness.
security:
- bearerAuth: []
paths:
  /auth/register:
    post:
      tags:
      - Authentification
      summary: Créer un compte
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: coach@example.com
              password: SecureP@ss123
              role: coach
      responses:
        '201':
          description: Compte créé.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '409':
          $ref: '#/components/responses/Conflict'
  /auth/login:
    post:
      tags:
      - Authentification
      summary: Authentifier et délivrer les jetons
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: coach@example.com
              password: SecureP@ss123
      responses:
        '200':
          description: Authentifié.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/refresh:
    post:
      tags:
      - Authentification
      summary: Renouveler la session (rotation + détection de réutilisation)
      description: Le refresh token est à usage unique. La réutilisation d'un jeton déjà consommé invalide
        toute la famille (vol présumé) et renvoie 409 TOKEN_REUSE_DETECTED.
      operationId: refresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Nouveau couple de jetons.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '409':
          $ref: '#/components/responses/TokenReuse'
  /auth/logout:
    post:
      tags:
      - Authentification
      summary: Révoquer le refresh token courant
      operationId: logout
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: Session révoquée.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/logout-all:
    post:
      tags:
      - Authentification
      summary: Révoquer toutes les sessions
      operationId: logoutAll
      responses:
        '204':
          description: Toutes les sessions ont été révoquées.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/forgot-password:
    post:
      tags:
      - Authentification
      summary: Déclencher la réinitialisation (réponse neutre)
      description: Réponse identique que l'email existe ou non (anti-énumération de comptes).
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '202':
          description: Demande prise en compte (réponse neutre).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/reset-password:
    post:
      tags:
      - Authentification
      summary: Réinitialiser le mot de passe (token à usage unique)
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: Mot de passe réinitialisé.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /auth/2fa/enable:
    post:
      tags:
      - Authentification
      summary: Activer la 2FA TOTP (V2)
      description: Réservé aux comptes coach. Fonctionnalité prévue en V2.
      operationId: enable2fa
      responses:
        '200':
          description: Secret TOTP à provisionner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
  /auth/2fa/verify:
    post:
      tags:
      - Authentification
      summary: Vérifier un code 2FA (V2)
      operationId: verify2fa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorVerify'
      responses:
        '204':
          description: Code vérifié.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/me:
    get:
      tags:
      - Profil & RGPD
      summary: Profil courant
      operationId: getMe
      responses:
        '200':
          description: Profil.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags:
      - Profil & RGPD
      summary: Mettre à jour le profil
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: Profil mis à jour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
      - Profil & RGPD
      summary: Demander la suppression du compte (asynchrone)
      operationId: deleteMe
      responses:
        '202':
          description: Suppression planifiée.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/me/consents:
    get:
      tags:
      - Profil & RGPD
      summary: Lister les consentements
      operationId: getConsents
      responses:
        '200':
          description: État des consentements.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags:
      - Profil & RGPD
      summary: Donner ou retirer un consentement
      operationId: updateConsent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentUpdate'
            example:
              type: coach_access
              granted: false
              textVersion: 2026-01
      responses:
        '200':
          description: Consentement mis à jour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Consent'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/me/export:
    post:
      tags:
      - Profil & RGPD
      summary: Demander un export de données (asynchrone)
      operationId: requestExport
      responses:
        '202':
          description: Export en cours de préparation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/me/export/{jobId}:
    get:
      tags:
      - Profil & RGPD
      summary: Statut et lien de l'export
      operationId: getExport
      parameters:
      - $ref: '#/components/parameters/JobIdPath'
      responses:
        '200':
          description: Statut de l'export.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '404':
          $ref: '#/components/responses/NotFound'
  /groups:
    post:
      tags:
      - Groupes
      summary: Créer un groupe
      operationId: createGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreate'
      responses:
        '201':
          description: Groupe créé.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags:
      - Groupes
      summary: Lister ses groupes
      operationId: listGroups
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Liste paginée des groupes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /groups/mine:
    get:
      tags:
      - Groupes
      summary: Lister ses groupes (athlète) et son coach
      description: >-
        Renvoie les groupes actifs de l'athlète courant (ADR-26), chacun enrichi
        du résumé de son coach et de la date d'adhésion. Le code d'invitation
        n'est jamais exposé à l'athlète (ADR-16). Ensemble borné, non paginé.
      operationId: getMyGroups
      responses:
        '200':
          description: Groupes actifs de l'athlète.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AthleteGroupList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
  /groups/{id}:
    get:
      tags:
      - Groupes
      summary: Détail d'un groupe
      operationId: getGroup
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Groupe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
      - Groupes
      summary: Modifier un groupe
      operationId: updateGroup
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupUpdate'
      responses:
        '200':
          description: Groupe mis à jour.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - Groupes
      summary: Supprimer (logique) un groupe
      operationId: deleteGroup
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Groupe supprimé.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /groups/{id}/members:
    get:
      tags:
      - Groupes
      summary: Lister les membres
      operationId: listGroupMembers
      parameters:
      - $ref: '#/components/parameters/IdPath'
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Liste paginée des membres.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMemberPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /groups/{id}/members/{athleteId}:
    delete:
      tags:
      - Groupes
      summary: Retirer un athlète du groupe
      operationId: removeGroupMember
      parameters:
      - $ref: '#/components/parameters/IdPath'
      - $ref: '#/components/parameters/AthleteIdPath'
      responses:
        '204':
          description: Athlète retiré.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /groups/{id}/invite-code:
    post:
      tags:
      - Groupes
      summary: Régénérer ou révoquer le code d'invitation
      operationId: manageInviteCode
      parameters:
      - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteCodeAction'
      responses:
        '200':
          description: Nouveau code (ou code révoqué).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InviteCode'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /groups/join:
    post:
      tags:
      - Groupes
      summary: Rejoindre un groupe via code
      operationId: joinGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinGroupRequest'
      responses:
        '200':
          description: Groupe rejoint.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMember'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '404':
          $ref: '#/components/responses/NotFound'
  /groups/{id}/leave:
    post:
      tags:
      - Groupes
      summary: Quitter un groupe
      operationId: leaveGroup
      parameters:
      - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Groupe quitté.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /sessions:
    post:
      tags:
      - Séances
      summary: Créer une séance
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreate'
      responses:
        '201':
          description: Séance créée.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/ServerError'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags:
