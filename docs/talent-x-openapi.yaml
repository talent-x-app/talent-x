    CompetitionUpdate:
      type: object
      properties:
        name:
          type: string
        discipline:
          type: string
        location:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        description:
          type: string
        status:
          $ref: '#/components/schemas/CompetitionStatus'
    CompetitionEntryStatus:
      type: string
