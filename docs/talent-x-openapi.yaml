        series:
          type: array
          items:
            $ref: '#/components/schemas/ProgressSeries'
      required:
      - athleteId
      - metrics
      - series
    ProgressSeries:
      type: object
      description: >-
        Série de progression d'une épreuve (ADR-21, étendue ADR-34) : un point par
        performance soumise qui la mesure — value = meilleure marque de la perf, date =
        soumission — plus le SB (meilleure marque de l'année civile en cours) et le tableau
        des marques par année. Le PB reste porté par PersonalRecord (revendiqué, ADR-20).
      properties:
        eventKey:
          type: string
          description: 'Clé d''épreuve dérivée du bloc typé (ex. sprint:60m — ADR-20).'
        label:
          type: string
        unit:
          type: string
          enum: [s, m]
        direction:
          type: string
          enum: [min, max]
        points:
          type: array
          items:
            $ref: '#/components/schemas/ProgressPoint'
        seasonBest:
          allOf:
