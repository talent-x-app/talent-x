components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token JWT signé RS256.
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AthleteIdPath:
      name: athleteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobIdPath:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortParam:
      name: sort
      in: query
      required: false
      description: Champ de tri, préfixé de '-' pour l'ordre décroissant (ex. -createdAt).
      schema:
        type: string
    SessionStatusFilter:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/SessionStatus'
    AssignmentStatusFilter:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/AssignmentStatus'
    CompetitionStatusFilter:
      name: status
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/CompetitionStatus'
    SessionIdQuery:
      name: sessionId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    PerformanceIdQuery:
      name: performanceId
      in: query
      required: false
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Clé d'idempotence générée par le client pour absorber les reprises réseau.
      schema:
        type: string
  headers:
    RateLimit-Limit:
      description: Quota sur la fenêtre courante.
      schema:
        type: integer
    RateLimit-Remaining:
      description: Requêtes restantes sur la fenêtre.
      schema:
        type: integer
    RateLimit-Reset:
      description: Secondes avant réinitialisation du quota.
      schema:
        type: integer
    Retry-After:
      description: Secondes à attendre avant un nouvel essai.
      schema:
        type: integer
  responses:
    BadRequest:
      description: Requête invalide.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 400
            error: BAD_REQUEST
            message: Invalid request
    Unauthorized:
      description: Authentification requise ou invalide.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 401
            error: UNAUTHORIZED
            message: Authentication required
    Forbidden:
      description: Accès refusé (rôle, appartenance ou propriété).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 403
            error: FORBIDDEN
            message: Access denied
    NotFound:
      description: Ressource introuvable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 404
            error: NOT_FOUND
            message: Resource not found
    Conflict:
      description: Conflit (ressource déjà existante).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 409
            error: CONFLICT
            message: Resource already exists
    ValidationFailed:
      description: Échec de validation des données.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 422
            error: VALIDATION_ERROR
            message: Validation failed
            details:
            - field: email
              constraint: isEmail
              message: email must be a valid email address
    TooManyRequests:
      description: Trop de requêtes (rate limiting).
      headers:
        RateLimit-Limit:
          $ref: '#/components/headers/RateLimit-Limit'
        RateLimit-Remaining:
          $ref: '#/components/headers/RateLimit-Remaining'
        RateLimit-Reset:
          $ref: '#/components/headers/RateLimit-Reset'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 429
            error: RATE_LIMITED
            message: Too many requests
    ServerError:
      description: Erreur interne.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 500
            error: INTERNAL_ERROR
            message: Internal server error
    ConsentRequired:
      description: Action bloquée faute de consentement actif.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 403
            error: CONSENT_REQUIRED
            message: Consent required
    IdempotencyConflict:
      description: 'Conflit d''idempotence : la clé a déjà été utilisée avec une charge différente.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 409
            error: IDEMPOTENCY_CONFLICT
            message: Idempotency key reused with a different payload
    TokenReuse:
      description: 'Réutilisation de refresh token détectée : la famille de jetons est révoquée.'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            statusCode: 409
            error: TOKEN_REUSE_DETECTED
            message: Session invalidated
  schemas:
    Error:
      type: object
      properties:
        statusCode:
          type: integer
        error:
          type: string
          description: Code d'erreur stable et exploitable côté client.
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationDetail'
        timestamp:
          type: string
          format: date-time
        path:
          type: string
      required:
      - statusCode
      - error
      - message
    ValidationDetail:
      type: object
      properties:
        field:
          type: string
        constraint:
          type: string
        message:
          type: string
    PageMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        hasNext:
          type: boolean
      required:
      - total
      - page
      - limit
      - hasNext
    Job:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - processing
          - ready
          - failed
      required:
      - jobId
      - status
    ExportJob:
      allOf:
      - $ref: '#/components/schemas/Job'
      - type: object
        properties:
          downloadUrl:
            type: string
            format: uri
          expiresAt:
            type: string
            format: date-time
    Role:
      type: string
      enum:
      - coach
      - athlete
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          $ref: '#/components/schemas/Role'
        firstName:
          type: string
        lastName:
          type: string
      required:
      - email
      - password
      - role
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - email
      - password
    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
      - refreshToken
    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Durée de vie de l'access token, en secondes.
      required:
      - accessToken
      - refreshToken
      - expiresIn
    AuthSession:
      allOf:
      - $ref: '#/components/schemas/AuthTokens'
      - type: object
        properties:
          user:
            $ref: '#/components/schemas/User'
        required:
        - user
    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
        newPassword:
          type: string
          minLength: 8
      required:
      - token
      - newPassword
    TwoFactorSetup:
      type: object
      properties:
        otpauthUrl:
          type: string
        secret:
          type: string
    TwoFactorVerify:
      type: object
      properties:
        code:
          type: string
      required:
      - code
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/Role'
        firstName:
          type: string
        lastName:
          type: string
        photoUrl:
          type: string
          format: uri
        sport:
          type: string
        bio:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - email
      - role
    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        sport:
          type: string
      required:
      - id
    UserUpdate:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        photoUrl:
          type: string
          format: uri
        sport:
          type: string
        bio:
          type: string
    ConsentType:
      type: string
      enum:
      - data_processing
      - coach_access
      - marketing
    Consent:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ConsentType'
        granted:
          type: boolean
        textVersion:
          type: string
        updatedAt:
          type: string
          format: date-time
      required:
      - type
      - granted
    ConsentUpdate:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ConsentType'
        granted:
          type: boolean
        textVersion:
          type: string
      required:
      - type
      - granted
    ConsentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Consent'
      required:
      - data
    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        coachId:
          type: string
          format: uuid
        inviteCode:
          type: string
        memberCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - name
      - coachId
    GroupCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
      - name
    GroupUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
    GroupMember:
      type: object
      properties:
        athleteId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        joinedAt:
          type: string
          format: date-time
        athlete:
          $ref: '#/components/schemas/UserSummary'
      required:
      - athleteId
      - groupId
    AthleteGroup:
      type: object
      description: >-
        Vue athlète d'un de ses groupes (ADR-26). N'expose jamais le code
        d'invitation, réservé au coach propriétaire (ADR-16).
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        memberCount:
          type: integer
        joinedAt:
          type: string
          format: date-time
        coach:
          $ref: '#/components/schemas/UserSummary'
      required:
      - id
      - name
      - memberCount
      - joinedAt
      - coach
    AthleteGroupList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AthleteGroup'
      required:
      - data
    JoinGroupRequest:
      type: object
      properties:
        inviteCode:
          type: string
      required:
      - inviteCode
    InviteCodeAction:
      type: object
      properties:
        action:
          type: string
          enum:
          - regenerate
          - revoke
      required:
      - action
    InviteCode:
      type: object
      properties:
        inviteCode:
          type:
          - string
          - 'null'
          description: null après révocation.
    SessionStatus:
      type: string
      description: >-
        Statut d'une séance. `template` = modèle réutilisable (bibliothèque
        C-10, ADR-29) : non daté et non assignable (assigner un `template` →
        422 SESSION_NOT_ASSIGNABLE).
      enum:
      - draft
      - published
      - archived
      - template
    Load:
      type: object
      properties:
        value:
          type: number
        unit:
          type: string
          enum:
          - kg
          - lb
          - percent_1rm
          - bodyweight
      required:
      - value
      - unit
    BlockType:
      type: string
      description: >-
        Type de bloc par discipline (contrat v2, cf. ADR-18). Un bloc sans `type`
        est interprété comme `custom` (variante générique, rétro-compat v1).
      enum:
      - strength
      - interval
      - sprint
      - endurance
      - hurdles
      - jumps
      - vertical_jumps
      - throws
      - core
      - warmup
      - cooldown
      - custom
    Exercise:
      type: object
      properties:
        name:
          type: string
        order:
          type: integer
        type:
          $ref: '#/components/schemas/BlockType'
        sets:
          type: integer
        reps:
          type: integer
        durationSeconds:
          type: integer
        restSeconds:
          type: integer
        load:
          $ref: '#/components/schemas/Load'
        notes:
          type: string
        params:
          type: object
          additionalProperties: true
          description: >-
            Paramètres propres au `type` (cadre libre au niveau du contrat — la forme
            par discipline est fixée par le ticket de l'éditeur correspondant,
            TLX-054…061, cf. ADR-18).
      required:
      - name
      - order
    ExercisesDoc:
      type: object
      description: >-
        Document JSONB des blocs (TX-DATA-006 §9.1). v3 (ADR-27) autorise des nœuds
        `ExerciseGroup` (tours/séries) à côté des `Exercise` ; tout document v1/v2
        (liste plate d'exercices, sans `kind`) reste valide.
      properties:
        schemaVersion:
          type: integer
          description: Version du contrat JSONB (cf. TX-DATA-006).
        items:
          type: array
          items:
            oneOf:
            - $ref: '#/components/schemas/Exercise'
            - $ref: '#/components/schemas/ExerciseGroup'
            description: >-
              Exercice simple (sans `kind`) ou groupe (`kind: "group"`). Pas de
              discriminator : le narrowing se fait par présence de `kind` (ADR-27).
      required:
      - items
    ExerciseGroup:
      type: object
      description: >-
        Groupe d'exercices répété en tours/séries (ADR-27, exercises v3) — séries de
        courses, contraste/superset, circuits, gammes. **Un seul niveau** : `items` ne
        contient que des `Exercise`, jamais un groupe.
      properties:
        kind:
          type: string
          enum:
          - group
          description: Discriminant structurel — présent uniquement sur un groupe.
        name:
          type: string
        order:
          type: integer
        groupType:
          type: string
          enum:
          - superset
          - circuit
          - series
          description: Sémantique d'affichage/guidage (défaut circuit) — pas de mécanique.
        rounds:
          type: integer
          minimum: 1
          description: Nombre de tours/séries (entier ≥ 1).
        restBetweenItemsSeconds:
          type: integer
          minimum: 0
          description: r — récup entre exercices d'un même tour (s).
        restBetweenRoundsSeconds:
          type: integer
          minimum: 0
          description: R — récup entre tours (s).
        notes:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/Exercise'
      required:
      - kind
      - name
      - order
      - rounds
      - items
    CoachNotes:
      type: object
      description: >-
        Notes internes du coach (ADR-28) — COACH UNIQUEMENT : absent de la
        réponse pour un lecteur athlète (filtrage serveur).
      properties:
        regression:
          type: string
          description: Variante allégée si l'athlète décroche.
        progression:
          type: string
          description: Évolution prévue pour la prochaine fois.
        caution:
          type: string
          description: Point de vigilance que le coach surveille (contexte, historique).
    SessionBrief:
      type: object
      description: >-
        Couche éditoriale d'une séance — double lecture coach/athlète (ADR-28).
        Toutes les propriétés sont optionnelles (brief absent, partiel ou complet).
        `intent` et `coachNotes` sont retirés de la réponse pour un lecteur athlète
        (filtrage serveur, jamais côté client).
      properties:
        schemaVersion:
          type: integer
          description: Version du contrat JSONB (cf. TX-DATA-006 §9.x).
        athleteIntent:
          type: string
          description: Consigne pour l'athlète, en une phrase (visible coach ET athlète).
        durationMinutes:
          type: integer
          minimum: 0
          description: Durée estimée de la séance, en minutes (visible coach ET athlète).
        difficulty:
          type: integer
          minimum: 1
          maximum: 10
          description: Difficulté cible, 1..10 (visible coach ET athlète).
        successCriteria:
          type: string
          description: Critère de réussite « Réussi si… » (visible coach ET athlète).
        stopCriteria:
          type: string
          description: Règle d'arrêt « Stop si… », dite à l'athlète (visible coach ET athlète).
        intent:
          type: string
          description: >-
            Intention d'entraînement du jour — COACH UNIQUEMENT : absent de la
            réponse pour un lecteur athlète.
        coachNotes:
          $ref: '#/components/schemas/CoachNotes'
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        scheduledDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/SessionStatus'
        coachId:
          type: string
          format: uuid
        exercises:
          $ref: '#/components/schemas/ExercisesDoc'
        brief:
          $ref: '#/components/schemas/SessionBrief'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - title
      - status
      - coachId
      - exercises
    SessionCreate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        scheduledDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/SessionStatus'
        exercises:
          $ref: '#/components/schemas/ExercisesDoc'
        brief:
          $ref: '#/components/schemas/SessionBrief'
      required:
      - title
      - exercises
    SessionUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        scheduledDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/SessionStatus'
        exercises:
          $ref: '#/components/schemas/ExercisesDoc'
        brief:
          $ref: '#/components/schemas/SessionBrief'
    AssignRequest:
      type: object
      description: >-
        Cible d'affectation : des athlètes (`athleteIds`) et/ou des groupes
        (`groupIds`). Au moins l'un des deux doit être non vide (422 sinon).
        Les `groupIds` sont résolus côté serveur vers les membres actifs ; une
        `SessionAssignment` est matérialisée par athlète (ADR-30). Idempotent
        par couple (séance, athlète) : un athlète à la fois explicite et membre
        d'un groupe ciblé n'est affecté qu'une fois.
      properties:
        athleteIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
        groupIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
        dueDate:
          type: string
          format: date
    AssignmentStatus:
      type: string
      enum:
      - assigned
      - in_progress
      - completed
      - skipped
    Assignment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        athleteId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/AssignmentStatus'
        dueDate:
          type: string
          format: date
        skipReason:
          $ref: '#/components/schemas/SkipReason'
        session:
          $ref: '#/components/schemas/Session'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
      - id
      - sessionId
      - athleteId
      - status
    SkipReason:
      type: string
      description: Motif d'indisponibilité quand l'affectation est skipped (ADR-31).
      enum:
      - injury
      - absence
      - weather
      - other
    AssignmentUpdateRequest:
      type: object
      description: >-
        Mise à jour partielle d'une affectation (ADR-31). Au moins un champ requis.
        Transitions de statut bornées (jamais 'completed', réservé à la soumission
        de perf). 'skipReason' n'est pris en compte que si status='skipped'.
      properties:
        status:
          type: string
          enum:
          - assigned
          - in_progress
          - skipped
          description: Nouveau statut (machine à états ADR-31). Coach et/ou athlète selon la transition.
        dueDate:
          type: string
          format: date
          nullable: true
          description: Replanification (coach propriétaire). null retire l'échéance.
        skipReason:
          $ref: '#/components/schemas/SkipReason'
    AssignmentList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Assignment'
      required:
      - data
    CompetitionStatus:
      type: string
      enum:
      - draft
      - published
      - cancelled
    Competition:
      type: object
