      - results
    RecordCandidate:
      type: object
      description: Proposition de record personnel détectée sur une performance (ADR-20).
      properties:
        eventKey:
          type: string
          description: 'Clé d''épreuve dérivée du bloc typé (ex. sprint:60m, throws:7.26kg).'
        label:
          type: string
          description: Libellé affichable de l'épreuve (ex. « 60 m »).
        value:
          type: number
          description: Mesure candidate (secondes ou mètres).
        unit:
          type: string
          enum: [s, m]
        previousValue:
          type: number
